<!DOCTYPE html>
<html>
<head>
    <title>मेहनत - Login</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="container">

    <h1>मेहनत</h1>

    <h3>Aim: 100/100 in मेहनत</h3>

    <p class="motto">
        Together We Can, Together We Will
    </p>

    <form action="/login" method="POST">

        <input
            type="text"
            name="username"
            placeholder="Username"
            required
        >

        <input
            type="password"
            name="password"
            placeholder="Password"
            required
        >

        <button type="submit">
            Login
        </button>

    </form>

</div>

</body>
</html>
